<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <!-- Link to Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <title>Bootstrap Layout</title>
</head>
<body>

    <!-- Navigation Bar Example (Component) -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
      <div class="container">
        <a class="navbar-brand" href="#">Navbar</a>
        <!-- ... other navbar content ... -->
      </div>
    </nav>

    <!-- Main Content Area -->
    <main class="container mt-4">
        <h1>Welcome to the site</h1>
        
        <!-- Grid Layout Example (Two columns) -->
        <div class="row">
            <div class="col-md-8">
                <h2>Main Content (8 columns on medium screens and up)</h2>
                <p>This is the primary content area.</p>
            </div>
            <div class="col-md-4">
                <h2>Sidebar (4 columns on medium screens and up)</h2>
                <p>This is a secondary content area.</p>
            </div>
        </div>
    </main>

    <!-- Footer Example -->
    <footer class="mt-5 py-3 bg-dark text-white">
        <div class="container">
            <p class="text-center">Footer Content &copy; 2026</p>
        </div>
    </footer>

    <!-- Bootstrap JavaScript Bundle (optional, but needed for interactive components like navbars, modals, etc.) -->
    <script src="https://cdn.jsdelivr.net" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

</body>
</html>
